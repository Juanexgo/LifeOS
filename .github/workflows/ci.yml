name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build
    # `macos-latest` rolls forward so we get whichever runner image has
    # the newest Xcode + Swift toolchain. LifeOS targets iOS 26 and uses
    # Swift 6.2 features, so we don't pin to macos-15 (Xcode 16) which
    # ships an older toolchain than Tuist's ProjectDescription.framework.
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Toolchain info
        run: |
          xcode-select -p
          xcodebuild -version
          swift --version

      - name: Install Tuist
        run: brew install tuist

      - name: Cache DerivedData
        uses: actions/cache@v4
        with:
          path: ~/Library/Developer/Xcode/DerivedData
          key: ${{ runner.os }}-xcode-${{ hashFiles('**/Project.swift', '**/Tuist.swift') }}
          restore-keys: |
            ${{ runner.os }}-xcode-

      - name: Generate Xcode project
        run: tuist generate --no-open

      - name: Build
        run: |
          xcodebuild \
            -workspace LifeOS.xcworkspace \
            -scheme LifeOS \
            -configuration Debug \
            -destination 'generic/platform=iOS Simulator' \
            CODE_SIGNING_ALLOWED=NO \
            build

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check for trailing whitespace
        run: |
          if git grep -nIE ' +$' -- '*.swift'; then
            echo "Trailing whitespace found"
            exit 1
          fi
      - name: Surface unscoped TODOs (non-blocking)
        run: |
          git grep -nE 'TODO[^:]' -- '*.swift' || true
