name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# LifeOS targets iOS 26 / Swift 6.2, which requires Xcode 26+. GitHub's
# hosted runners currently top out at Xcode 16.4 — they don't carry
# Xcode 26 yet (typical 1–3 month lag after a major Xcode release).
#
# Until those runners catch up, CI runs lint + syntax checks on Linux.
# The full Xcode build is verified locally with Xcode 26.5+. When GitHub
# adds Xcode 26 to a macos-XX image, we add a `build` job here that runs
# `tuist generate && xcodebuild build` on that image.

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Trailing whitespace
        run: |
          if git grep -nIE ' +$' -- '*.swift'; then
            echo "::error::Trailing whitespace found in Swift sources"
            exit 1
          fi

      - name: Tabs in Swift sources
        run: |
          if git grep -nIP '\t' -- '*.swift'; then
            echo "::error::Tab characters found in Swift sources — use spaces"
            exit 1
          fi

      - name: Surface unscoped TODOs (non-blocking)
        run: |
          git grep -nE 'TODO[^:(]' -- '*.swift' || true

      - name: Verify ADRs reference real files
        run: |
          missing=0
          for adr in docs/adr/*.md; do
            # Pull `(path/to/file)` references and check they exist.
            for ref in $(grep -oE '\([^)]*\.swift\)' "$adr" | tr -d '()' ); do
              if [ ! -e "$ref" ] && ! find . -path "./.git" -prune -o -name "$(basename "$ref")" -print | grep -q .; then
                echo "::error file=$adr::ADR references missing file: $ref"
                missing=1
              fi
            done
          done
          exit $missing
